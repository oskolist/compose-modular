# https://github.com/minlaxz/fortivpn-to-socks5/blob/main/entrypoint.sh
# https://github.com/minlaxz/fortivpn-to-socks5/blob/main/Dockerfile
services:
  fortivpn-to-socks5:
    #image: ${GHCR_MIRROR:-ghcr.io/tosainu}/fortivpn-socks5:master
    image: ${GHCR_MIRROR:-ghcr.io/minlaxz}/fortivpn-to-socks5:main
    #container_name: fortivpn-socks5
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/ppp
    volumes:
      - ../../data/fortivpn-to-socks5/sockets/:/dev/shm/
      - type: bind
        source: ../fortivpn-to-socks5/openfortivpn.conf.secret
        #source: ../fortivpn-to-socks5/openfortivpn.conf # maybe we should .env to .env.public and .env.secret instead of this
        target: /etc/openfortivpn/config.template
        read_only: true
        bind:
          create_host_path: false
      - type: image
        source: ${GHCR_MIRROR:-ghcr.io/yasn77}/envsubst-image:1.4.2
        target: /usr/local/bin/go-envsubst
        image:
          subpath: usr/bin/envsubst
      # For Debugging:
      #- type: image
      #  source: library/busybox:stable-musl
      #  target: /usr/local/bin/busybox
      #  image:
      #    subpath: bin/busybox
    ports:
      - "${FORTIVPNTOSOCKS_BIND:-127.0.0.1}:${FORTIVPNTOSOCKS_PORT:-8443}:${FORTIVPNTOSOCKS_PORT:-8443}"
    env_file:
      - path: ../fortivpn-to-socks5/.env
        required: true
    entrypoint: /bin/sh
    command:
      - -c
      - |
        go-envsubst -no-unset -no-empty -i "/etc/openfortivpn/config.template" -o "/etc/openfortivpn/config"
        /usr/bin/glider -listen :$${FORTIVPNTOSOCKS_PORT:-8443} &
        if [ -n "$${FORTIVPNTOSOCKS_SOCKET_PATH}" ]; then
          /usr/bin/glider -listen unix:///dev/shm/fortivpn-to-socks.sock,socks5:// -forward socks5://127.0.0.1:$${FORTIVPNTOSOCKS_PORT:-8443} &
        fi
        echo "http/socks5 proxy server: $$(hostname -i):$${FORTIVPNTOSOCKS_PORT:-8443}"
        #sleep 10
        exec openfortivpn
