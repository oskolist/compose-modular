# https://forgejo.org/docs/latest/admin/setup/reverse-proxy/
services:
  nginx:
    volumes:
      - type: bind
        source: ../forgejo/nginx.http.domain.conf
        target: /etc/nginx/conf.d/domains/${FORGEJO_DOMAIN}/forgejo.conf.template
        read_only: true
        bind:
          create_host_path: false
    environment:
      - FORGEJO_PORT=${FORGEJO_PORT:-3000}
