location / {
    proxy_pass http://zooid:$ZOOID_PORT;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $$http_upgrade;
    proxy_set_header Connection "upgrade";
    # https://serverfault.com/questions/363159/nginx-proxy-pass-redirects-ignore-port#407983
    #proxy_set_header Host $$host; # this does not work because "$$host" does not container port
    #proxy_set_header Host $$host:$$server_port; # this does not work for my situation too either because when another proxy is added(for example nginx steam block) the "$$server_port" is not the port that client is connecting too
    proxy_set_header Host $$http_host; # this works because contains both host and port
    proxy_set_header X-Real-IP $$remote_addr;
    proxy_set_header X-Forwarded-For $$remote_addr;
    proxy_set_header X-Forwarded-Proto $$scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    # add_header Access-Control-Allow-Origin *;
}
