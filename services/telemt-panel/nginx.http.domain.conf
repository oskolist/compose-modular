#server_name $TELEMTPANEL_DOMAIN;
location /${TELEMTPANEL_PATH_PREFIX} {
  proxy_pass http://telemt-panel:$TELEMTPANEL_PORT;
  proxy_http_version 1.1;
  proxy_set_header Origin ""; # TeleMT-Panel needs this to allow websocket connection but don't know why
  proxy_set_header Upgrade $$http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $$host;
  proxy_set_header X-Real-IP $$remote_addr;
  proxy_set_header X-Forwarded-For $$remote_addr;
  proxy_set_header X-Forwarded-Proto $$scheme;
  proxy_read_timeout 86400s;
  proxy_send_timeout 86400s;
}

