include /etc/nginx/conf.d/obsidianirc.d/*.conf;
#server_name $OBSIDIANIRC_DOMAIN;
root        $OBSIDIANIRC_ROOT;
location = /servers.json {
  alias /etc/obsidianirc/servers.json;
}
location / {
  include /etc/nginx/conf.d/obsidianirc.d/location.d/*.conf;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $$http_upgrade;
  proxy_set_header Connection "Upgrade";
  proxy_set_header X-Forwarded-For $$remote_addr;
  proxy_set_header X-Forwarded-Proto $$scheme;
  proxy_read_timeout 10m;
  index  index.html index.htm;
  try_files $$uri $$uri/ =404;
  #try_files $$uri $$uri/ /index.html;
}
