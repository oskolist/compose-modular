#server_name $DUFS_DOMAIN;
client_max_body_size 0;
# TODO: because DUFS_PATH_PREFIX can be empty and be still valid but because go-envsubst still do not accept "${DUFS_PATH_PREFIX:-}" i had to remove `-no-empty`. proper fix should be a bugfix in go-envsubst
location /${DUFS_PATH_PREFIX} {
  proxy_pass http://dufs:$DUFS_PORT;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $$http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $$host;
  proxy_set_header X-Real-IP $$remote_addr;
  proxy_set_header X-Forwarded-For $$remote_addr;
  proxy_set_header X-Forwarded-Proto $$scheme;
  proxy_read_timeout 86400s;
  proxy_send_timeout 86400s;
  proxy_max_temp_file_size 0;
  proxy_buffering off;
  proxy_request_buffering off;
}
