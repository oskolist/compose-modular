services:
  dufs:
    image: sigoden/dufs
    volumes:
      - type: bind
        source: ../../data/dufs
        target: /data
        read_only: false
      - type: bind
        source: ../../data/dufs
        target: /data
        read_only: false
      - type: image
        source: library/busybox:stable-musl
        target: /bin/busybox
        image:
          subpath: bin/busybox
    ports:
      - ${DUFS_PORT}:5000
    environment:
      - DUFS_PATH_PREFIX=${DUFS_PATH_PREFIX}
      - DUFS_HIDDEN=${DUFS_HIDDEN}
      - DUFS_AUTH=${DUFS_AUTH}
      - DUFS_ALLOW_ALL=${DUFS_ALLOW_ALL}
      - DUFS_ALLOW_UPLOAD=${DUFS_ALLOW_UPLOAD}
      - DUFS_ALLOW_DELETE=${DUFS_ALLOW_DELETE}
      - DUFS_ALLOW_SEARCH=${DUFS_ALLOW_SEARCH}
      - DUFS_ALLOW_SYMLINK=${DUFS_ALLOW_SYMLINK}
      - DUFS_ALLOW_ARCHIVE=${DUFS_ALLOW_ARCHIVE}
      - DUFS_ALLOW_HASH=${DUFS_ALLOW_HASH}
      - DUFS_ENABLE_CORS=${DUFS_ENABLE_CORS}
      - DUFS_RENDER_INDEX=${DUFS_RENDER_INDEX}
      - DUFS_RENDER_TRY_INDEX=${DUFS_RENDER_TRY_INDEX}
      - DUFS_RENDER_SPA=${DUFS_RENDER_SPA}
      - DUFS_LOG_FORMAT=${DUFS_LOG_FORMAT}
      #- DUFS_LOG_FILE=${DUFS_LOG_FILE:-/dev/stdout}
      - DUFS_COMPRESS=${DUFS_COMPRESS:-low}
    entrypoint: /bin/busybox
    command:
      - sh
      - -c
      - |
        # Remove empty environment variables
        for var in $$(busybox env | busybox grep '^DUFS_' | busybox cut -d= -f1); do
          busybox test -z "$(eval echo -n "\$$$$var")" && unset "$$var"
        done
        exec /bin/dufs "/data"
